<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อนุบาล 2 เทอม 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff66a3;
            --light-pink: #ffe6f0;
            --bg-pink: #fff0f5;
            --text-dark: #5a2e3f;
        }

        body {
            background-color: var(--bg-pink);
            background-image: radial-gradient(#ffb3d1 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Kanit', sans-serif;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 5px dashed var(--primary-pink);
            position: relative;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Mali', cursive;
            color: var(--primary-pink);
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            color: #d81b60;
            margin-bottom: 40px;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary-pink);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-family: 'Mali', cursive;
            font-size: 1.2em;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
            transition: all 0.3s;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.6);
            background-color: #ff3385;
        }

        .icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; border-radius: 20px; border-width: 3px; }
            h1 { font-size: 1.8em; }
            p { font-size: 1em; margin-bottom: 25px; }
            .btn-home { font-size: 1em; padding: 10px 22px; }
            .icon { font-size: 3.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚧✨</div>
        <h1>กำลังจัดทำตารางเรียน</h1>
        <p>อนุบาล 2 เทอม 1<br>คุณแม่ยังไม่ได้อัปเดตตารางเรียนของเทอมนี้นะคะ รอก่อนน้าาา 🥰</p>
        <a href="index.html" class="btn-home">⬅️ กลับหน้าหลัก</a>
    </div>
</body>
</html>
